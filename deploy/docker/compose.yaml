# UniSentinel GRC platform — self-hosted stack (on-prem Linux / any Docker host).
# This file ships VERBATIM inside the release bundle; keep it runtime-only
# (no build sections — images come from the registry or an air-gap tarball;
# local dev builds with: docker build -f deploy/docker/Dockerfile .).
#   cp .env.example .env   # set POSTGRES_PASSWORD + AUTH_SECRET
#   docker compose up -d
# Upgrades: ./upgrade.sh in the bundle (pre-upgrade dump + health-checked);
# the web container applies DB migrations on start (advisory-locked).
name: unisentinel

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: unisentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unisentinel"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    image: ${IMAGE:-ghcr.io/dregnargh/unisentinel}:${TAG:-latest}
    restart: unless-stopped
    command: ["web"]
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/unisentinel
      DATABASE_SSL: "false" # same-host container network; front TLS with a reverse proxy
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env (openssl rand -base64 32)}
      # Keep true when a TLS reverse proxy fronts this stack. Set to false in
      # .env ONLY for plain-HTTP LAN access — browsers refuse Secure cookies
      # from non-HTTPS origins (localhost excepted) and login breaks.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FILE_STORAGE_PATH: /data/files
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
    volumes:
      - usdata:/data
    ports:
      - "${WEB_PORT:-8080}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  worker:
    image: ${IMAGE:-ghcr.io/dregnargh/unisentinel}:${TAG:-latest}
    restart: unless-stopped
    command: ["worker"]
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/unisentinel
      DATABASE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FILE_STORAGE_PATH: /data/files
    volumes:
      - usdata:/data
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  usdata:
